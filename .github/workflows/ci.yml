name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: git ls-files '*.json' | xargs -I{} python3 -m json.tool {} > /dev/null

      - name: Dash lint (no em dash or en dash)
        run: '! git grep -nIP ''\x{2014}|\x{2013}'' -- .'

      - name: Shell syntax check
        run: bash -n hooks/*.sh

      - name: Hook smoke test
        run: |
          for script in hooks/session-start.sh hooks/prompt-nudge.sh; do
            output="$(CLAUDE_PLUGIN_ROOT=. bash "$script")"
            exit_status=$?
            if [ "$exit_status" -ne 0 ]; then
              echo "FAIL: $script exited with status $exit_status"
              exit 1
            fi
            if [ -z "$output" ]; then
              echo "FAIL: $script produced no output"
              exit 1
            fi
            echo "OK: $script"
          done

          output="$(echo '{}' | CLAUDE_PLUGIN_ROOT=. bash hooks/inline-counter.sh)"
          exit_status=$?
          if [ "$exit_status" -ne 0 ]; then
            echo "FAIL: hooks/inline-counter.sh exited with status $exit_status"
            exit 1
          fi
          echo "OK: hooks/inline-counter.sh (silent by design, empty output is expected)"

      - name: Counter functional test
        run: |
          rm -f "${TMPDIR:-/tmp}/fable-baton-count-citest"
          export FABLE_BATON_TRIPWIRE=4

          for i in 1 2 3; do
            output="$(echo '{"tool_name":"Bash","session_id":"citest"}' | bash hooks/inline-counter.sh)"
            if [ -n "$output" ]; then
              echo "FAIL: call $i expected empty output, got: $output"
              exit 1
            fi
          done
          echo "OK: calls 1-3 produced no notice"

          output="$(echo '{"tool_name":"Bash","session_id":"citest"}' | bash hooks/inline-counter.sh)"
          if [ -z "$output" ]; then
            echo "FAIL: call 4 expected non-empty output, got empty"
            exit 1
          fi
          case "$output" in
            *additionalContext*"4 consecutive"*) ;;
            *) echo "FAIL: call 4 output missing expected content: $output"; exit 1 ;;
          esac
          echo "OK: call 4 produced the delegation notice"

          output="$(echo '{"tool_name":"Agent","session_id":"citest"}' | bash hooks/inline-counter.sh)"
          if [ -n "$output" ]; then
            echo "FAIL: reset call expected empty output, got: $output"
            exit 1
          fi
          echo "OK: Agent call reset the counter"

          output="$(echo '{"tool_name":"Bash","session_id":"citest"}' | bash hooks/inline-counter.sh)"
          if [ -n "$output" ]; then
            echo "FAIL: post-reset call expected empty output, got: $output"
            exit 1
          fi
          echo "OK: post-reset call confirms counter is back at 1"
