<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:#0e0c0a;}
  *{font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;}
  svg .anim{transform-box:fill-box;}
  /* baton arm waves around the shoulder */
  .arm-group{transform-origin:100% 100%;animation:wave 1.6s ease-in-out infinite;}
  @keyframes wave{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(11deg)}}
  /* conductor sways gently */
  .conductor{transform-origin:50% 100%;animation:sway 3.2s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-1.6deg)}50%{transform:rotate(1.6deg)}}
  /* sparkle pulses */
  .sparkle{transform-origin:50% 50%;animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(0.8);opacity:.75}50%{transform:scale(1.35);opacity:1}}
  /* notes drift up and fade, staggered */
  .note{animation:drift 3.2s linear infinite;}
  .n2{animation-delay:-1.05s}
  .n3{animation-delay:-2.15s}
  @keyframes drift{0%{transform:translateY(14px);opacity:0}22%{opacity:.85}70%{opacity:.5}100%{transform:translateY(-46px);opacity:0}}
  /* agents bob to the beat, staggered */
  .bob{animation:bob 1.6s ease-in-out infinite;}
  .b2{animation-delay:-0.4s}
  .b3{animation-delay:-0.8s}
  .b4{animation-delay:-1.2s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  /* spotlight glow breathes */
  .glowpulse{animation:breathe 3.2s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.75}50%{opacity:1}}
</style>
</head>
<body>
<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181310"/>
      <stop offset="1" stop-color="#241a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#e8825a" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#e8825a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2118"/>
      <stop offset="1" stop-color="#1c1410"/>
    </linearGradient>
    <radialGradient id="bodyg" cx="0.38" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#f09468"/>
      <stop offset="1" stop-color="#d96f47"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="640" y="0" width="640" height="640" fill="url(#glow)" class="anim glowpulse"/>

  <!-- left: wordmark -->
  <text x="84" y="208" font-size="84" font-weight="800" fill="#f5efe8" letter-spacing="-2">fable-baton</text>
  <text x="88" y="268" font-size="30" fill="#c9b9a8">Fable 5 holds the baton. The orchestra plays.</text>

  <text x="88" y="342" font-size="22" fill="#8f8172">Fable keeps the judgment. Tiered agents do the labor.</text>
  <text x="88" y="376" font-size="22" fill="#8f8172">Delegation enforced by hooks, proven in CI.</text>

  <rect x="84" y="428" rx="12" width="520" height="58" fill="#26201a" stroke="#3d3227" stroke-width="1.5"/>
  <text x="110" y="465" font-size="21" font-family="SF Mono, Menlo, monospace" fill="#e8b98a">/plugin install fable-baton@fable-baton</text>

  <text x="88" y="548" font-size="20" fill="#6e6255">MIT · zero config · every repo, every session</text>

  <!-- stage -->
  <ellipse cx="960" cy="576" rx="330" ry="52" fill="url(#stage)"/>

  <!-- conductor podium -->
  <path d="M 920 470 L 1000 470 L 992 512 L 928 512 Z" fill="#33251a"/>
  <rect x="914" y="464" width="92" height="10" rx="5" fill="#453222"/>

  <!-- conductor: original blob character -->
  <g class="anim conductor">
    <path d="M 926 462 C 922 408 938 372 960 372 C 982 372 998 408 994 462 Z" fill="url(#bodyg)"/>
    <circle cx="960" cy="346" r="34" fill="#ef9068"/>
    <circle cx="948" cy="342" r="4.5" fill="#241a12"/>
    <circle cx="972" cy="342" r="4.5" fill="#241a12"/>
    <path d="M 950 358 Q 960 366 970 358" stroke="#241a12" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 992 408 Q 1014 420 1010 440" stroke="#e8825a" stroke-width="14" fill="none" stroke-linecap="round"/>
    <g class="anim arm-group">
      <path d="M 930 406 Q 906 384 892 356" stroke="#e8825a" stroke-width="14" fill="none" stroke-linecap="round"/>
      <line x1="892" y1="356" x2="856" y2="298" stroke="#f5efe8" stroke-width="5" stroke-linecap="round"/>
      <path class="anim sparkle" d="M 850 288 L 854 278 L 858 288 L 868 292 L 858 296 L 854 306 L 850 296 L 840 292 Z" fill="#ffd9a0"/>
    </g>
  </g>

  <!-- music notes -->
  <text x="1046" y="300" font-size="30" fill="#c9b9a8" class="anim note">&#9834;</text>
  <text x="1092" y="352" font-size="24" fill="#a08f7c" class="anim note n2">&#9835;</text>
  <text x="806" y="252" font-size="24" fill="#a08f7c" class="anim note n3">&#9834;</text>

  <!-- orchestra: four tiered agents -->
  <g text-anchor="middle">
    <g class="anim bob">
      <circle cx="756" cy="520" r="26" fill="#7ad3c9"/>
      <circle cx="747" cy="516" r="3.4" fill="#12302c"/>
      <circle cx="765" cy="516" r="3.4" fill="#12302c"/>
      <path d="M 749 527 Q 756 532 763 527" stroke="#12302c" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </g>
    <text x="756" y="580" font-size="19" font-weight="700" fill="#d8cfc4">scout</text>
    <text x="756" y="604" font-size="16" fill="#8f8172">Haiku</text>

    <g class="anim bob b2">
      <circle cx="884" cy="546" r="26" fill="#6fa8ff"/>
      <circle cx="875" cy="542" r="3.4" fill="#101f38"/>
      <circle cx="893" cy="542" r="3.4" fill="#101f38"/>
      <path d="M 877 553 Q 884 558 891 553" stroke="#101f38" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </g>
    <text x="884" y="606" font-size="19" font-weight="700" fill="#d8cfc4">executor</text>
    <text x="884" y="630" font-size="16" fill="#8f8172">Sonnet</text>

    <g class="anim bob b3">
      <circle cx="1036" cy="546" r="26" fill="#b78af7"/>
      <circle cx="1027" cy="542" r="3.4" fill="#221238"/>
      <circle cx="1045" cy="542" r="3.4" fill="#221238"/>
      <path d="M 1029 553 Q 1036 558 1043 553" stroke="#221238" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </g>
    <text x="1036" y="606" font-size="19" font-weight="700" fill="#d8cfc4">architect</text>
    <text x="1036" y="630" font-size="16" fill="#8f8172">Opus</text>

    <g class="anim bob b4">
      <circle cx="1164" cy="520" r="26" fill="#8fd97a"/>
      <circle cx="1155" cy="516" r="3.4" fill="#16300f"/>
      <circle cx="1173" cy="516" r="3.4" fill="#16300f"/>
      <path d="M 1157 527 Q 1164 532 1171 527" stroke="#16300f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </g>
    <text x="1164" y="580" font-size="19" font-weight="700" fill="#d8cfc4">verifier</text>
    <text x="1164" y="604" font-size="16" fill="#8f8172">Haiku</text>
  </g>
</svg>
<script>
  // Deterministic frame sampling: ?t=<seconds> freezes every animation at that time.
  var t = new URLSearchParams(location.search).get('t');
  if (t !== null) {
    var ms = parseFloat(t) * 1000;
    document.getAnimations().forEach(function(a){ a.currentTime = ms; a.pause(); });
  }
</script>
</body>
</html>
