name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: git ls-files '*.json' | xargs -I{} python3 -m json.tool {} > /dev/null

      - name: Dash lint (no em dash or en dash)
        run: '! git grep -nIP ''\x{2014}|\x{2013}'' -- .'

      - name: Shell syntax check
        run: bash -n hooks/*.sh

      - name: Hook smoke test
        run: |
          for script in hooks/session-start.sh hooks/prompt-nudge.sh; do
            output="$(CLAUDE_PLUGIN_ROOT=. bash "$script")"
            exit_status=$?
            if [ "$exit_status" -ne 0 ]; then
              echo "FAIL: $script exited with status $exit_status"
              exit 1
            fi
            if [ -z "$output" ]; then
              echo "FAIL: $script produced no output"
              exit 1
            fi
            echo "OK: $script"
          done

          output="$(echo '{}' | CLAUDE_PLUGIN_ROOT=. bash hooks/inline-counter.sh)"
          exit_status=$?
          if [ "$exit_status" -ne 0 ]; then
            echo "FAIL: hooks/inline-counter.sh exited with status $exit_status"
            exit 1
          fi
          echo "OK: hooks/inline-counter.sh (silent by design, empty output is expected)"

      - name: Counter functional test
        run: |
          rm -f "${TMPDIR:-/tmp}/fable-baton-count-citest"
          export FABLE_BATON_TRIPWIRE=4

          for i in 1 2 3; do
            output="$(echo '{"tool_name":"Bash","session_id":"citest"}' | bash hooks/inline-counter.sh)"
            if [ -n "$output" ]; then
              echo "FAIL: call $i expected empty output, got: $output"
              exit 1
            fi
          done
          echo "OK: calls 1-3 produced no notice"

          output="$(echo '{"tool_name":"Bash","session_id":"citest"}' | bash hooks/inline-counter.sh)"
          if [ -z "$output" ]; then
            echo "FAIL: call 4 expected non-empty output, got empty"
            exit 1
          fi
          case "$output" in
            *additionalContext*"4 consecutive"*) ;;
            *) echo "FAIL: call 4 output missing expected content: $output"; exit 1 ;;
          esac
          echo "OK: call 4 produced the delegation notice"

          output="$(echo '{"tool_name":"Agent","session_id":"citest"}' | bash hooks/inline-counter.sh)"
          if [ -n "$output" ]; then
            echo "FAIL: reset call expected empty output, got: $output"
            exit 1
          fi
          echo "OK: Agent call reset the counter"

          output="$(echo '{"tool_name":"Bash","session_id":"citest"}' | bash hooks/inline-counter.sh)"
          if [ -n "$output" ]; then
            echo "FAIL: post-reset call expected empty output, got: $output"
            exit 1
          fi
          echo "OK: post-reset call confirms counter is back at 1"

      - name: Tier adaptation test
        run: |
          rm -f "${TMPDIR:-/tmp}/fable-baton-tier-citier" "${TMPDIR:-/tmp}/fable-baton-count-citier"

          output="$(echo '{}' | CLAUDE_PLUGIN_ROOT=. bash hooks/session-start.sh)"
          case "$output" in
            *"Session model adaptation"*) echo "FAIL: no-model input must inject the base policy only"; exit 1 ;;
            *"Orchestration policy"*) echo "OK: no-model input falls back to base policy" ;;
            *) echo "FAIL: base policy missing from output"; exit 1 ;;
          esac

          output="$(echo '{"model":"claude-sonnet-5","session_id":"citier"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/session-start.sh)"
          case "$output" in
            *"Session model adaptation: Sonnet"*) echo "OK: sonnet session gets the sonnet adaptation" ;;
            *) echo "FAIL: sonnet adaptation missing from output"; exit 1 ;;
          esac

          output="$(echo '{"session_id":"citier"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/prompt-nudge.sh)"
          case "$output" in
            *"Sonnet session"*) echo "OK: prompt nudge picked up the persisted sonnet tier" ;;
            *) echo "FAIL: prompt nudge did not adapt to the sonnet tier: $output"; exit 1 ;;
          esac

          export FABLE_BATON_TRIPWIRE=1
          output="$(echo '{"tool_name":"Bash","session_id":"citier"}' | bash hooks/inline-counter.sh)"
          case "$output" in
            *"Sonnet session"*) echo "OK: counter notice adapted to the sonnet tier" ;;
            *) echo "FAIL: counter notice did not adapt to the sonnet tier: $output"; exit 1 ;;
          esac
          unset FABLE_BATON_TRIPWIRE

          output="$(echo '{"model":"claude-opus-4-8","session_id":"citier"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/session-start.sh)"
          case "$output" in
            *"Session model adaptation: Opus"*) echo "OK: opus session gets the opus adaptation" ;;
            *) echo "FAIL: opus adaptation missing from output"; exit 1 ;;
          esac

          output="$(echo '{"model":"claude-haiku-4-5-20251001","session_id":"citier"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/session-start.sh)"
          case "$output" in
            *"Session model adaptation: Haiku"*) echo "OK: haiku session gets the haiku adaptation" ;;
            *) echo "FAIL: haiku adaptation missing from output"; exit 1 ;;
          esac

          output="$(echo '{"model":"claude-fable-5","session_id":"citier"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/session-start.sh)"
          case "$output" in
            *"Session model adaptation"*) echo "FAIL: fable session must not get an adaptation"; exit 1 ;;
            *) echo "OK: fable session gets the base policy only" ;;
          esac

          rm -f "${TMPDIR:-/tmp}/fable-baton-tier-citranscript" "${TMPDIR:-/tmp}/fable-baton-adapted-citranscript"
          printf '%s\n' '{"type":"user","message":{"content":[]}}' > "${TMPDIR:-/tmp}/baton-ci-transcript.jsonl"
          printf '%s\n' '{"type":"assistant","message":{"model":"claude-sonnet-5","content":[]}}' >> "${TMPDIR:-/tmp}/baton-ci-transcript.jsonl"

          output="$(echo '{"session_id":"citranscript","transcript_path":"'"${TMPDIR:-/tmp}"'/baton-ci-transcript.jsonl"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/prompt-nudge.sh)"
          case "$output" in
            *"Sonnet session"*"Session model adaptation: Sonnet"*) echo "OK: prompt nudge detected the tier from the transcript and announced it" ;;
            *) echo "FAIL: prompt nudge did not detect and announce the transcript tier: $output"; exit 1 ;;
          esac

          output="$(echo '{"session_id":"citranscript","transcript_path":"'"${TMPDIR:-/tmp}"'/baton-ci-transcript.jsonl"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/prompt-nudge.sh)"
          case "$output" in
            *"Session model adaptation"*) echo "FAIL: prompt nudge must announce the adaptation only once"; exit 1 ;;
            *"Sonnet session"*) echo "OK: prompt nudge stayed quiet on the second call for the same tier" ;;
            *) echo "FAIL: prompt nudge lost the sonnet tier on the second call: $output"; exit 1 ;;
          esac

          output="$(echo '{"session_id":"citranscript","transcript_path":"'"${TMPDIR:-/tmp}"'/baton-ci-transcript.jsonl"}' | CLAUDE_PLUGIN_ROOT=. bash hooks/session-start.sh)"
          case "$output" in
            *"Session model adaptation: Sonnet"*) echo "OK: session-start fell back to transcript detection on resume" ;;
            *) echo "FAIL: session-start did not fall back to transcript detection: $output"; exit 1 ;;
          esac

          tier_value="$(cat "${TMPDIR:-/tmp}/fable-baton-tier-citranscript")"
          if [ "$tier_value" != "sonnet" ]; then
            echo "FAIL: persisted tier for citranscript expected sonnet, got: $tier_value"
            exit 1
          fi
          echo "OK: persisted tier file for citranscript is sonnet"
